<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
/* =================================================
   PAGE CONFIG (DOMPDF SAFE)
================================================= */
@page {
    size: A4;
    margin: 12mm;
}

/* =================================================
   BODY = PAGE BORDER (CRITICAL FIX)
================================================= */
body {
    font-family: "DejaVu Sans", Arial, sans-serif;
    font-size: 12px;
    color: #1f2933;

    margin: 0;
    padding: 10px;

    border: 2px solid #0b3c5d;
    border-radius: 14px;

    box-sizing: border-box;
}

/* =================================================
   MAIN WRAPPER (NO HEIGHT!)
================================================= */
.receipt-wrapper {
    position: relative;
    padding: 10px 18px 85px; /* bottom space reserved for stamp */
    box-sizing: border-box;
}

/* =================================================
   WATERMARK
================================================= */
/* =================================================
   SMART PAID WATERMARK
================================================= */
.watermark-paid {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-25deg);

    font-size: 78px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;

    color: rgba(11, 60, 93, 0.05);

    z-index: 0;
    pointer-events: none;
    white-space: nowrap;
}

.receipt-wrapper * {
    position: relative;
    z-index: 1;
}

/* =================================================
   HEADER (HORIZONTAL — SPACE SAVER)
================================================= */
.header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
}

.header img {
    width: 58px;
    flex-shrink: 0;
}

.header-text {
    line-height: 1.2;
}

.company-name {
    font-size: 15px;
    font-weight: 800;
    color: #0b3c5d;
    margin: 0;
}

.company-sub {
    font-size: 11px;
    color: #6b7280;
    margin: 0;
}

/* =================================================
   TITLE BAR
================================================= */
.title {
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    margin: 6px 0 8px;
    padding: 6px 0;
    background: #eef6fc;
    color: #0b3c5d;
    border-radius: 8px;
}

/* =================================================
   META INFO
================================================= */
.meta {
    background: #f9fafb;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.meta-row {
    margin-bottom: 3px;
}

.meta-row strong {
    display: inline-block;
    width: 110px;
}

/* =================================================
   TABLE
================================================= */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
}

th {
    background: #0b3c5d;
    color: #ffffff;
    padding: 6px;
    font-size: 12px;
}

td {
    padding: 6px;
    border-bottom: 1px solid #e5e7eb;
}

.amount {
    text-align: right;
    font-weight: 600;
}

/* =================================================
   TOTAL
================================================= */
.total {
    margin-top: 6px;
    padding: 8px;
    font-size: 14px;
    font-weight: 800;
    text-align: right;
    background: #eef6fc;
    color: #0b3c5d;
    border-radius: 8px;
}

/* =================================================
   STAMP / SIGNATURE (ABSOLUTE & SAFE)
================================================= */
.stamp {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 210px;
    opacity: 0.95;
}
</style>
</head>

<body>

<!-- DOMPDF FIRST-PAGE SAFETY -->
<div style="page-break-before: avoid;"></div>

<div class="receipt-wrapper">

    <div class="watermark-paid">PAID</div>


    <!-- HEADER -->
    <div class="header">
        <img src="{{LOGO_PATH}}" alt="Company Logo">
        <div class="header-text">
            <div class="company-name">PARROT CANADA VISA</div>
            <div class="company-sub">CONSULTANT CO. LTD</div>
        </div>
    </div>

    <!-- TITLE -->
    <div class="title">OFFICIAL PAYMENT RECEIPT</div>

    <!-- META -->
    <div class="meta">
        <div class="meta-row"><strong>Receipt No:</strong> {{RECEIPT_NO}}</div>
        <div class="meta-row"><strong>Customer:</strong> {{CUSTOMER_NAME}}</div>
        <div class="meta-row"><strong>Package:</strong> {{PACKAGE_TITLE}}</div>
        <div class="meta-row"><strong>Date:</strong> {{DATE}}</div>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th width="36">#</th>
                <th>Description</th>
                <th width="120" class="amount">Amount</th>
            </tr>
        </thead>
        <tbody>
            {{ITEM_ROWS}}
        </tbody>
    </table>

    <!-- TOTAL -->
    <div class="total">
        TOTAL: {{CURRENCY}} {{TOTAL_AMOUNT}}
    </div>

    <!-- STAMP -->
    <img src="{{STAMP_PATH}}" class="stamp" alt="Official Stamp">

</div>

</body>
</html>
