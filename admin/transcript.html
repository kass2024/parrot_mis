<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academic Transcript Processing</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

.container {
  width: 620px;
  margin: 70px auto;
  background: #ffffff;
  padding: 32px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2, h3 {
  text-align: center;
  margin-bottom: 18px;
}

.step {
  margin-bottom: 30px;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 6px;
}

.field {
  margin-bottom: 18px;
}

.gender-group {
  display: flex;
  gap: 25px;
}

.gender-group label {
  font-weight: normal;
}

button {
  padding: 11px 24px;
  background: #427431;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
}

button.secondary {
  background: #2e7d32;
}

button:disabled {
  background: #999;
  cursor: not-allowed;
}

.hidden { display: none; }

#loading {
  margin-top: 20px;
  text-align: center;
  font-weight: bold;
}

.info {
  background: #f9fafb;
  padding: 18px;
  border-radius: 6px;
}

.info p {
  margin: 8px 0;
}

.error {
  color: #b00020;
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}

.actions {
  text-align: center;
  margin-top: 20px;
}

.downloads {
  margin-top: 15px;
}

.downloads a {
  display: block;
  margin: 8px 0;
  color: #427431;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h2>Academic Transcript Processing</h2>

  <!-- STEP 1 -->
  <div class="step">
    <h3>Step 1: Extract Transcript</h3>

    <form id="transcriptForm" enctype="multipart/form-data">

      <div class="field">
        <label>Gender *</label>
        <div class="gender-group">
          <label><input type="radio" name="gender" value="male" required> Male</label>
          <label><input type="radio" name="gender" value="female" required> Female</label>
        </div>
      </div>

      <div class="field">
        <label>Transcript (PDF / Image)</label>
        <input type="file" name="transcript" required>
      </div>

      <div class="actions">
        <button type="submit" id="extractBtn">Extract Transcript</button>
      </div>

    </form>
  </div>

  <div id="loading" class="hidden">⏳ Extracting transcript…</div>

  <!-- STEP 2 -->
  <div id="result" class="hidden">
    <h3>Step 2: Review & Generate Letters</h3>

    <div class="info">
      <p><strong>Name:</strong> <span id="name"></span></p>
      <p><strong>Surname:</strong> <span id="surname"></span></p>
      <p><strong>Registration #:</strong> <span id="reg"></span></p>
      <p><strong>Program:</strong> <span id="program"></span></p>
      <p><strong>Academic Year:</strong> <span id="year"></span></p>
      <p><strong>Class:</strong> <span id="class"></span></p>
      <p><strong>Date of Birth:</strong> <span id="dob"></span></p>
      <p><strong>Gender:</strong> <span id="gender"></span></p>
    </div>

    <div class="actions">
      <button type="button" class="secondary" id="generateBtn" disabled>
        Generate Recommendation Letters
      </button>
    </div>

    <div id="downloads" class="downloads hidden"></div>
  </div>

  <div id="error" class="error hidden"></div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  let extractedData = null;
  let selectedGender = null;

  const form = document.getElementById('transcriptForm');
  const extractBtn = document.getElementById('extractBtn');
  const generateBtn = document.getElementById('generateBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const error = document.getElementById('error');
  const downloads = document.getElementById('downloads');

  /* =====================
     EXTRACT
  ===================== */
  form.addEventListener('submit', async e => {
    e.preventDefault();

    extractBtn.disabled = true;
    generateBtn.disabled = true;
    loading.classList.remove('hidden');
    result.classList.add('hidden');
    error.classList.add('hidden');

    const formData = new FormData(form);
    selectedGender = formData.get('gender');

    try {
      const res = await fetch('../extract/extract_transcript.php', {
        method: 'POST',
        body: formData
      });

      const text = await res.text();
      let json;

      try {
        json = JSON.parse(text);
      } catch {
        error.textContent = 'Invalid response from extraction service';
        error.classList.remove('hidden');
        extractBtn.disabled = false;
        loading.classList.add('hidden');
        return;
      }

      extractBtn.disabled = false;
      loading.classList.add('hidden');

      if (json.status !== 'success') {
        error.textContent = json.message || 'Extraction failed';
        error.classList.remove('hidden');
        return;
      }

      extractedData = json.data;

      document.getElementById('name').textContent = extractedData.name;
      document.getElementById('surname').textContent = extractedData.surname;
      document.getElementById('reg').textContent = extractedData.registration_number;
      document.getElementById('program').textContent = extractedData.program;
      document.getElementById('year').textContent = extractedData.academic_year_start;
      document.getElementById('class').textContent = extractedData.class;
      document.getElementById('dob').textContent = extractedData.date_of_birth;
      document.getElementById('gender').textContent =
        selectedGender === 'male' ? 'Male' : 'Female';

      result.classList.remove('hidden');
      generateBtn.disabled = false;

    } catch {
      extractBtn.disabled = false;
      loading.classList.add('hidden');
      error.textContent = 'Server error during extraction';
      error.classList.remove('hidden');
    }
  });

  /* =====================
     GENERATE
  ===================== */
  generateBtn.addEventListener('click', async () => {

    if (!extractedData || !selectedGender) {
      alert('Please extract transcript first.');
      return;
    }

    downloads.innerHTML = '';
    downloads.classList.add('hidden');

    try {
      const res = await fetch('../letters/generate_letters.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          gender: selectedGender,
          data: extractedData
        })
      });

      const text = await res.text();
      let json;

      try {
        json = JSON.parse(text);
      } catch {
        alert('Invalid response from letter generator. Check console.');
        console.error(text);
        return;
      }

      if (json.status !== 'success') {
        alert(json.message || 'Letter generation failed');
        return;
      }

      json.files.forEach(f => {
        const a = document.createElement('a');
        a.href = f.path;
        a.textContent = '⬇ Download ' + f.name;
        a.setAttribute('download', f.name);
        downloads.appendChild(a);
      });

      downloads.classList.remove('hidden');

    } catch (err) {
      console.error(err);
      alert('Network error during letter generation');
    }
  });

});
</script>

</body>
</html>
